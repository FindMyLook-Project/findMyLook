version: '3.8'

services:
  ml-server:
    build: ./ML
    ports:
      - "8000:8000"

  backend:
    build: ./Backend
    ports:
      - "3000:3000"
    environment:
      - ML_SERVICE_URL=http://ml-server:8000
    env_file:
      - ./Backend/.env
    depends_on:
      - ml-server

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend