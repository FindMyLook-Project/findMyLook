version: '3.8'

services:
  ml-server:
    build: ./ML
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 600s 

  backend:
    build: ./Backend
    ports:
      - "3000:3000"
    environment:
      - ML_SERVICE_URL=http://ml-server:8000
    env_file:
      - ./Backend/.env
    depends_on:
      ml-server:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  hf-cache: